<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groundwork Control Plane</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; background: #1a1a2e; color: #eee; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00d4ff; }
        .card { background: #16213e; border-radius: 8px; padding: 20px; margin: 10px 0; }
        .status { padding: 10px; border-radius: 4px; margin: 10px 0; }
        .online { background: #006600; }
        .offline { background: #660000; }
        button { background: #00d4ff; color: #000; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Groundwork Control Plane</h1>
        <div class="card">
            <h2>Dashboard</h2>
            <div id="status">Loading...</div>
            <button onclick="loadMachines()">Refresh Machines</button>
            <div id="machines"></div>
        </div>
    </div>
    <script>
        async function loadMachines() {
            const res = await fetch('/api/machines');
            const machines = await res.json();
            document.getElementById('machines').innerHTML = machines.map(m => 
                `<div class="status ${m.status}">${m.name}: ${m.status}</div>`
            ).join('');
        }
        loadMachines();
    </script>
</body>
</html>
