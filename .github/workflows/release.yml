name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # Linux builds
      - name: Build groundworkd (Linux AMD64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o groundworkd-linux-amd64 ./cmd/groundworkd

      - name: Build groundworkd (Linux ARM64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o groundworkd-linux-arm64 ./cmd/groundworkd

      - name: Build gw-agent (Linux AMD64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o gw-agent-linux-amd64 ./cmd/gw-agent

      - name: Build gw-agent (Linux ARM64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o gw-agent-linux-arm64 ./cmd/gw-agent

      # Windows builds
      - name: Build groundworkd (Windows AMD64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o groundworkd-windows-amd64.exe ./cmd/groundworkd

      - name: Build groundworkd (Windows ARM64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o groundworkd-windows-arm64.exe ./cmd/groundworkd

      - name: Build gw-agent (Windows AMD64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o gw-agent-windows-amd64.exe ./cmd/gw-agent

      - name: Build gw-agent (Windows ARM64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o gw-agent-windows-arm64.exe ./cmd/gw-agent

      # macOS builds
      - name: Build groundworkd (macOS AMD64)
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o groundworkd-darwin-amd64 ./cmd/groundworkd

      - name: Build groundworkd (macOS ARM64)
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o groundworkd-darwin-arm64 ./cmd/groundworkd

      - name: Build gw-agent (macOS AMD64)
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o gw-agent-darwin-amd64 ./cmd/gw-agent

      - name: Build gw-agent (macOS ARM64)
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o gw-agent-darwin-arm64 ./cmd/gw-agent

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            groundworkd-linux-amd64
            groundworkd-linux-arm64
            gw-agent-linux-amd64
            gw-agent-linux-arm64
            groundworkd-windows-amd64.exe
            groundworkd-windows-arm64.exe
            gw-agent-windows-amd64.exe
            gw-agent-windows-arm64.exe
            groundworkd-darwin-amd64
            groundworkd-darwin-arm64
            gw-agent-darwin-amd64
            gw-agent-darwin-arm64
          generate_release_notes: true